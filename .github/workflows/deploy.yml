# .github/workflows/deploy.yml
# Step 3: Terraform インフラ反映 → Cloud Run デプロイ
# Workload Identity Federation を使用（JSON キー不要）

name: Deploy AI CSV Analyzer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: asia-northeast1
  SERVICE_NAME: ai-csv-analyzer
  REPO: ai-analyzer
  IMAGE_NAME: app

permissions:
  contents: read
  id-token: write   # Workload Identity Federation に必須
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Terraform (IaC)
  # ──────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform Plan / Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      # Step 1: Workload Identity Federation 認証（JSON キー不要）
      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="region=${{ env.REGION }}" \
            -var="github_repo=${{ github.repository }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      # PR へのプランコメント投稿
      - name: Comment Terraform Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...(省略)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply tfplan

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Container
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Cloud Run
  # ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Smoke Test (Health Check)
        run: |
          SERVICE_URL="${{ steps.deploy.outputs.url }}"
          echo "Cloud Run URL: $SERVICE_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Notify Deployment to Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          if [ "$STATUS" != "success" ]; then EMOJI="❌"; fi
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"$EMOJI Cloud Run デプロイ *${STATUS}*\n• サービス: \`${{ env.SERVICE_NAME }}\`\n• SHA: \`${{ github.sha }}\`\n• URL: ${{ steps.deploy.outputs.url }}\"
            }"

  # ──────────────────────────────────────────────────────────────────
  # Job 4: テスト（PR時）
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run Tests with Coverage
        id: run_tests
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-report=html:htmlcov \
            --cov-fail-under=80 \
            -v 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Step 15: GitHub Actions Step Summary ──────────────────────
      - name: Generate Step Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // coverage.json を読み込む
            let coverageData = null;
            try {
              coverageData = JSON.parse(fs.readFileSync('coverage.json', 'utf8'));
            } catch (e) {
              core.warning('coverage.json が見つかりません: ' + e.message);
            }

            const exitCode = '${{ steps.run_tests.outputs.exit_code }}';
            const passed   = exitCode === '0';
            const icon     = passed ? '✅' : '❌';
            const status   = passed ? 'PASSED' : 'FAILED';

            // ── サマリー冒頭 ──────────────────────────────────────
            let summary = `# ${icon} テスト結果: ${status}\n\n`;
            summary += `> **SHA**: \`${{ github.sha }}\`　｜　`;
            summary += `**実行日時**: ${new Date().toLocaleString('ja-JP', {timeZone: 'Asia/Tokyo'})}\n\n`;

            // ── 全体カバレッジ ────────────────────────────────────
            if (coverageData && coverageData.totals) {
              const tot   = coverageData.totals;
              const pct   = tot.percent_covered.toFixed(1);
              const bar   = buildBar(tot.percent_covered);
              const badge = pct >= 80 ? '🟢' : pct >= 60 ? '🟡' : '🔴';
              summary += `## 📊 全体カバレッジ\n\n`;
              summary += `| 指標 | 値 |\n|------|----|\n`;
              summary += `| カバレッジ率 | ${badge} **${pct}%** ${bar} |\n`;
              summary += `| 総ステートメント数 | ${tot.num_statements} |\n`;
              summary += `| 実行済み | ${tot.covered_lines} |\n`;
              summary += `| 未実行 | ${tot.missing_lines} |\n`;
              summary += `| 閾値 | 80% |\n\n`;
            }

            // ── ファイル別カバレッジテーブル ──────────────────────
            if (coverageData && coverageData.files) {
              summary += `## 📁 ファイル別カバレッジ\n\n`;
              summary += `| ファイル | カバレッジ | ステートメント | 実行済み ✅ | 未実行 ⚠️ | 未実行行番号 |\n`;
              summary += `|----------|-----------|--------------|-----------|---------|-------------|\n`;

              for (const [filePath, fileData] of Object.entries(coverageData.files)) {
                const s      = fileData.summary;
                const pct    = s.percent_covered.toFixed(1);
                const icon2  = s.percent_covered >= 80 ? '✅' : '⚠️';
                const missing = (fileData.missing_lines || []).slice(0, 8).join(', ')
                             + (fileData.missing_lines.length > 8 ? ' …' : '');
                const shortPath = filePath.replace(process.cwd() + '/', '');
                summary += `| \`${shortPath}\` | ${icon2} ${pct}% | ${s.num_statements} | ${s.covered_lines} | ${s.missing_lines} | ${missing || '—'} |\n`;
              }
              summary += '\n';
            }

            // ── テスト出力（末尾500行）────────────────────────────
            const rawOutput = fs.readFileSync('test_output.txt', 'utf8');
            const lines     = rawOutput.split('\n');
            const tail      = lines.slice(-120).join('\n');
            summary += `## 🖨 pytest 出力（末尾）\n\n\`\`\`\n${tail}\n\`\`\`\n`;

            await core.summary.addRaw(summary).write();

            // ── プログレスバー生成関数 ────────────────────────────
            function buildBar(pct) {
              const filled = Math.round(pct / 5);   // 20マス
              return '`' + '█'.repeat(filled) + '░'.repeat(20 - filled) + '`';
            }

      # ── PR コメント（Step Summary リンク付き）─────────────────────
      - name: Post Coverage Comment to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let coverageData = null;
            try {
              coverageData = JSON.parse(fs.readFileSync('coverage.json', 'utf8'));
            } catch (e) {}

            const exitCode = '${{ steps.run_tests.outputs.exit_code }}';
            const passed   = exitCode === '0';
            const icon     = passed ? '✅' : '❌';
            const stepUrl  = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            // ファイル別テーブル（PR コメント用・コンパクト版）
            let table = '';
            if (coverageData && coverageData.files) {
              table += '| ファイル | カバレッジ | 未実行行 | 状態 |\n';
              table += '|----------|-----------|---------|------|\n';
              for (const [filePath, fileData] of Object.entries(coverageData.files)) {
                const s       = fileData.summary;
                const pct     = s.percent_covered.toFixed(1);
                const status2 = s.percent_covered >= 80 ? '✅ OK' : '⚠️ 要改善';
                const missing = (fileData.missing_lines || []).slice(0, 6).join(', ')
                              + (fileData.missing_lines.length > 6 ? ' …' : '');
                const short   = filePath.replace(process.cwd() + '/', '');
                table += `| \`${short}\` | **${pct}%** | ${missing || '—'} | ${status2} |\n`;
              }
            }

            const totals = coverageData?.totals;
            const totalPct = totals ? totals.percent_covered.toFixed(1) : '—';
            const badge    = totals && totals.percent_covered >= 80 ? '🟢' : '🔴';

            const body = [
              `## ${icon} pytest-cov カバレッジレポート`,
              '',
              `${badge} **全体カバレッジ: ${totalPct}%**（閾値: 80%）`,
              '',
              table,
              '',
              `> 📋 詳細は [GitHub Actions Step Summary](${stepUrl}) を確認してください。`,
            ].join('\n');

            // 既存コメントを更新（重複投稿防止）
            const marker = '<!-- ai-coverage-report -->';
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));

            const fullBody = marker + '\n' + body;
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: fullBody,
              });
            }

      - name: Fail if coverage threshold not met
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1
